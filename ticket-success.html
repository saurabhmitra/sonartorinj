<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sonar Tori - Ticket Confirmed</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="icon" type="image/x-icon" href="images/favicon.ico">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;0,9..144,700;1,9..144,400&family=Mulish:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>

<body>
    <nav class="navbar">
        <div class="nav-container">
            <div class="logo">
                <a href="index.html" class="logo-link">
                    <img src="images/logo.jpg" alt="Sonar Tori Logo" class="logo-img">
                    <h1>Sonar Tori</h1>
                </a>
            </div>
            <ul class="nav-menu">
                <li><a href="index.html">Home</a></li>
                <li><a href="events.html">Events</a></li>
                <li><a href="tickets.html" class="active">Tickets</a></li>
                <li><a href="donate.html">Donate</a></li>
                <li><a href="contact.html">Contact Us</a></li>
            </ul>
            <a href="tickets.html" class="nav-cart" aria-label="View cart" title="View cart">
                <svg viewBox="0 0 24 24" width="26" height="26" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                    <circle cx="9" cy="21" r="1"></circle>
                    <circle cx="20" cy="21" r="1"></circle>
                    <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path>
                </svg>
                <span class="nav-cart-count" data-cart-count>0</span>
            </a>
            <div class="hamburger">
                <span></span>
                <span></span>
                <span></span>
            </div>
        </div>
    </nav>

    <main class="main-content">
        <section class="tickets-section">
            <div class="container">
                <div class="ticket-event-card ticket-success-card">
                    <div class="ticket-success-check" aria-hidden="true">
                        <svg viewBox="0 0 24 24" width="34" height="34" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>
                    </div>
                    <h2 class="ticket-event-title">Thank you! Your tickets are confirmed.</h2>
                    <p class="ticket-event-meta">A receipt and confirmation have been emailed to you by Stripe.
                        We look forward to celebrating Durga Pujo 2026 with you!</p>
                    <a href="index.html" class="checkout-btn ticket-success-home">Back to Home</a>
                </div>
            </div>
        </section>
    </main>

    <footer class="footer">
        <div class="container">
            <p>&copy; 2026 Sonar Tori. All rights reserved.</p>
        </div>
    </footer>

    <script src="script.js"></script>
    <script>
        // Payment succeeded — empty the saved cart so it doesn't linger.
        try { sessionStorage.removeItem('sonartori_cart_v1'); } catch (e) {}
        if (typeof window.updateCartBadge === 'function') window.updateCartBadge();
    </script>
</body>

</html>
